<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Testable Todo Item Card</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<main class="page-shell">
			<article class="todo-card" data-testid="test-todo-card" aria-label="Todo item card">
				<header class="todo-header">
					<h2 data-testid="test-todo-title">Think about your life</h2>
					<span
						class="badge priority-high"
						data-testid="test-todo-priority"
						aria-label="Priority high"
					>
						High
					</span>
				</header>

				<p data-testid="test-todo-description" class="todo-description">
					Write Code, Write Tests, Refactor, Repeat. This is the mantra of a software developer (Cries in yoruba)
				</p>

				<section class="todo-meta" aria-label="Task timing and status">
					<p class="meta-row">
						<strong>Due date:</strong>
						<time data-testid="test-todo-due-date" id="todo-due-date" datetime=""></time>
					</p>
					<p class="meta-row">
						<strong>Time remaining:</strong>
						<time
							data-testid="test-todo-time-remaining"
							id="todo-time-remaining"
							aria-live="polite"
						></time>
					</p>
					<p class="meta-row">
						<strong>Status:</strong>
						<span data-testid="test-todo-status" id="todo-status" class="badge status-in-progress">
							In Progress
						</span>
					</p>
				</section>

				<div class="todo-controls">
					<input
						type="checkbox"
						id="todo-complete-toggle"
						data-testid="test-todo-complete-toggle"
						aria-describedby="todo-status"
					/>
					<label for="todo-complete-toggle">Mark as complete</label>
				</div>

				<section aria-label="Task tags">
					<ul data-testid="test-todo-tags" class="tag-list" role="list">
						<li data-testid="test-todo-tag-work" class="tag-chip">work</li>
						<li data-testid="test-todo-tag-urgent" class="tag-chip">urgent</li>
						<li class="tag-chip">design</li>
					</ul>
				</section>

				<div class="todo-actions">
					<button type="button" data-testid="test-todo-edit-button" id="todo-edit-button">Edit</button>
					<button type="button" data-testid="test-todo-delete-button" id="todo-delete-button">
						Delete
					</button>
				</div>
			</article>
		</main>

		<script src="./index.js"></script>
	</body>
</html>
