<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Testable Todo Item Card</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<main class="page-shell">
			<article class="todo-card" data-testid="test-todo-card" aria-label="Todo item card">
				<div class="todo-view" id="todo-view">
					<header class="todo-header">
						<div class="todo-header-main">
							<span
								class="priority-indicator priority-high"
								data-testid="test-todo-priority-indicator"
								aria-hidden="true"
							></span>
							<h2 data-testid="test-todo-title">Think about your life</h2>
						</div>
						<span
							class="badge priority-high"
							data-testid="test-todo-priority"
							aria-label="Priority high"
						>
							High
						</span>
					</header>

					<section
						class="todo-collapsible"
						data-testid="test-todo-collapsible-section"
						id="todo-collapsible-section"
					>
						<p data-testid="test-todo-description" class="todo-description">
							Write Code, Write Tests, Refactor, Repeat. This is the mantra of a software developer (Cries in yoruba)
						</p>
					</section>
					<button
						type="button"
						class="ghost-button"
						data-testid="test-todo-expand-toggle"
						id="todo-expand-toggle"
						aria-expanded="false"
						aria-controls="todo-collapsible-section"
					>
						Expand description
					</button>

					<section class="todo-meta" aria-label="Task timing and status">
						<p class="meta-row">
							<strong>Due date:</strong>
							<time data-testid="test-todo-due-date" id="todo-due-date" datetime=""></time>
						</p>
						<p class="meta-row">
							<strong>Time remaining:</strong>
							<time
								data-testid="test-todo-time-remaining"
								id="todo-time-remaining"
								aria-live="polite"
							></time>
							<span
								class="badge overdue-indicator"
								data-testid="test-todo-overdue-indicator"
								id="todo-overdue-indicator"
								hidden
							>
								Overdue
							</span>
						</p>
						<p class="meta-row">
							<strong>Status:</strong>
							<span data-testid="test-todo-status" id="todo-status" class="badge status-in-progress">
								In Progress
							</span>
						</p>
					</section>

					<div class="todo-controls">
						<input
							type="checkbox"
							id="todo-complete-toggle"
							data-testid="test-todo-complete-toggle"
							aria-describedby="todo-status"
						/>
						<label for="todo-complete-toggle">Mark as complete</label>
					</div>

					<div class="status-control-wrap">
						<label for="todo-status-control"><strong>Set status:</strong></label>
						<select id="todo-status-control" data-testid="test-todo-status-control">
							<option value="Pending">Pending</option>
							<option value="In Progress" selected>In Progress</option>
							<option value="Done">Done</option>
						</select>
					</div>

					<section class="todo-tags" aria-label="Task tags">
						<ul data-testid="test-todo-tags" class="tag-list" role="list">
							<li data-testid="test-todo-tag-work" class="tag-chip">work</li>
							<li data-testid="test-todo-tag-urgent" class="tag-chip">urgent</li>
							<li class="tag-chip">design</li>
						</ul>
					</section>

					<div class="todo-actions">
						<button type="button" data-testid="test-todo-edit-button" id="todo-edit-button">Edit</button>
						<button type="button" data-testid="test-todo-delete-button" id="todo-delete-button">
							Delete
						</button>
					</div>
				</div>

				<form
					id="todo-edit-form"
					class="todo-edit-form"
					data-testid="test-todo-edit-form"
					hidden
					aria-label="Edit todo item"
				>
					<div class="form-row">
						<label for="todo-edit-title-input">Title</label>
						<input
							type="text"
							id="todo-edit-title-input"
							data-testid="test-todo-edit-title-input"
							required
						/>
					</div>
					<div class="form-row">
						<label for="todo-edit-description-input">Description</label>
						<textarea
							id="todo-edit-description-input"
							data-testid="test-todo-edit-description-input"
							rows="4"
						></textarea>
					</div>
					<div class="form-row">
						<label for="todo-edit-priority-select">Priority</label>
						<select id="todo-edit-priority-select" data-testid="test-todo-edit-priority-select">
							<option value="Low">Low</option>
							<option value="Medium">Medium</option>
							<option value="High">High</option>
						</select>
					</div>
					<div class="form-row">
						<label for="todo-edit-due-date-input">Due date</label>
						<input
							type="datetime-local"
							id="todo-edit-due-date-input"
							data-testid="test-todo-edit-due-date-input"
							required
						/>
					</div>
					<div class="todo-actions">
						<button type="submit" data-testid="test-todo-save-button" id="todo-save-button">
							Save
						</button>
						<button type="button" data-testid="test-todo-cancel-button" id="todo-cancel-button">
							Cancel
						</button>
					</div>
				</form>
			</article>
		</main>

		<script src="./index.js"></script>
	</body>
</html>
